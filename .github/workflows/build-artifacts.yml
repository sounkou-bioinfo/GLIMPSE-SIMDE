name: Build Artifacts

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            libbz2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            zlib1g-dev \
            liblzma-dev \
            libdeflate-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf bzip2 curl libdeflate openssl@3 xz zlib
          echo "HOMEBREW_PREFIX=$(brew --prefix)" >> "$GITHUB_ENV"

      - name: Configure macOS include/lib paths
        if: runner.os == 'macOS'
        run: |
          echo "CPATH=${HOMEBREW_PREFIX}/include:${CPATH}" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${HOMEBREW_PREFIX}/lib:${LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          make -f makefile

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: glimpse2-binaries-${{ matrix.os }}
          path: bin/GLIMPSE2_*
          if-no-files-found: error
